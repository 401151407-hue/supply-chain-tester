name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npm run dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          body: '## 📦 Windows 安装包'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npm run dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*-Mac-x64.dmg,dist/*-Mac-arm64.dmg
          body: '## 🍎 Mac 安装包 (Intel + Apple Silicon)'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
