name: Build macOS Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - id: release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 📦 安装包

            | 平台 | 来源 | 文件 |
            |------|------|------|
            | Windows | Gitee | `SupplyChainTester-${{ github.ref_name }}-Windows.exe` |
            | Mac Intel | GitHub | `SupplyChainTester-${{ github.ref_name }}-Mac-x64.dmg` |
            | Mac M系列 | GitHub | `SupplyChainTester-${{ github.ref_name }}-Mac-arm64.dmg` |

            > Windows 安装包由 Gitee Go 构建，[点击前往 Gitee Release](https://gitee.com/liaochenglu/supply-chain-tester/releases)
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npm run dist -- --${{ matrix.arch }}
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*-Mac-${{ matrix.arch }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
