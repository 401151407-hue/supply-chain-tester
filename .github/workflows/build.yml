name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Portable Python
        shell: powershell
        run: |
          $pythonDir = "resources\python-portable"
          if (-not (Test-Path $pythonDir)) { New-Item -ItemType Directory -Path $pythonDir -Force | Out-Null }
          $zipUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          $zipPath = "$env:TEMP\python-embed.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $pythonDir -Force
          $pthFile = Get-ChildItem -Path $pythonDir -Filter "python*._pth" | Select-Object -First 1
          if ($pthFile) {
            $content = Get-Content $pthFile.FullName -Raw
            $content = $content -replace "#import site", "import site"
            Set-Content -Path $pthFile.FullName -Value $content -NoNewline
          }
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$env:TEMP\get-pip.py" -UseBasicParsing
          & "$pythonDir\python.exe" "$env:TEMP\get-pip.py" --no-warn-script-location
          & "$pythonDir\Scripts\pip.exe" install requests openpyxl playwright --no-warn-script-location --quiet

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: resources\ms-playwright

      - name: Build & Package
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: resources/ms-playwright

      - name: Build & Package
        run: npm run dist -- --${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}-dmg
          path: dist/*-Mac-${{ matrix.arch }}.dmg

  publish-github:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 📦 安装包

            | 平台 | 文件 | 国内下载 |
            |------|------|----------|
            | Windows | `SupplyChainTester-${{ github.ref_name }}-Windows.exe` | [Gitee Release](https://gitee.com/liaochenglu/supply-chain-tester/releases) |
            | Mac Intel | `SupplyChainTester-${{ github.ref_name }}-Mac-x64.dmg` | [Gitee Release](https://gitee.com/liaochenglu/supply-chain-tester/releases) |
            | Mac M系列 | `SupplyChainTester-${{ github.ref_name }}-Mac-arm64.dmg` | [Gitee Release](https://gitee.com/liaochenglu/supply-chain-tester/releases) |
          files: |
            windows-exe/*.exe
            mac-x64-dmg/*.dmg
            mac-arm64-dmg/*.dmg
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-gitee:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Gitee Release & Upload
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # 列出所有构建产物
          echo "=== Windows ==="
          ls windows-exe/
          echo "=== Mac x64 ==="
          ls mac-x64-dmg/
          echo "=== Mac arm64 ==="
          ls mac-arm64-dmg/

          # 创建 Gitee Release
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/liaochenglu/supply-chain-tester/releases" \
            -H "Authorization: bearer $GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"构建于 GitHub Actions\",\"target_commitish\":\"master\"}")

          RELEASE_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Gitee Release ID: $RELEASE_ID"

          # 上传所有安装包
          for f in windows-exe/*.exe mac-x64-dmg/*.dmg mac-arm64-dmg/*.dmg; do
            echo "Uploading: $f"
            curl -s -X POST "https://gitee.com/api/v5/repos/liaochenglu/supply-chain-tester/releases/$RELEASE_ID/attach_files" \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f"
          done

          echo "✅ Gitee Release 发布完成"
